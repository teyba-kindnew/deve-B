<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration - MediCare</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card" style="max-width: 600px;">
            <div class="login-header">
                <i class="fas fa-user-plus"></i>
                <h1>Patient Registration</h1>
                <p>Create your account to book appointments</p>
            </div>

            <form id="register-form" class="login-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" id="fullname" required placeholder="Enter your full name">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Age *</label>
                        <input type="number" id="age" required min="1" max="120" placeholder="Age">
                    </div>
                    <div class="form-group">
                        <label>Gender *</label>
                        <select id="gender" required>
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" id="phone" required placeholder="+1-555-0000">
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="email" required placeholder="your@email.com">
                    </div>
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <textarea id="address" rows="2" placeholder="Enter your address"></textarea>
                </div>

                <div class="form-group">
                    <label>Medical History (Optional)</label>
                    <textarea id="medical-history" rows="3" placeholder="Any existing conditions, allergies, or medications..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Username *</label>
                        <input type="text" id="username" required placeholder="Choose a username">
                    </div>
                    <div class="form-group">
                        <label>Password *</label>
                        <input type="password" id="password" required placeholder="Choose a password">
                    </div>
                </div>

                <div class="form-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="terms" required>
                        <span>I agree to the Terms and Conditions</span>
                    </label>
                </div>

                <button type="submit" class="login-btn">
                    <i class="fas fa-user-plus"></i>
                    Register
                </button>
            </form>

            <div class="login-footer">
                <p>Already have an account? <a href="index.html" style="color: #667eea; text-decoration: none; font-weight: 600;">Login Here</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = {
                fullname: document.getElementById('fullname').value,
                age: document.getElementById('age').value,
                gender: document.getElementById('gender').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                address: document.getElementById('address').value,
                medicalHistory: document.getElementById('medical-history').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                status: 'pending' // Pending admin approval
            };
            
            // Store in localStorage (demo purposes)
            localStorage.setItem('registrationData', JSON.stringify(formData));
            
            alert('Registration successful! Your account is pending admin approval. You will be notified once approved.');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
